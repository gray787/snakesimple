<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade | Play Snake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            margin-bottom: 5px;
        }

        header p {
            color: #a0aec0;
            font-size: 1rem;
        }

        .game-container {
            background: #16213e;
            border: 4px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #e94560;
        }

        canvas {
            background-color: #0f172a;
            border: 2px solid #00f2fe;
            border-radius: 6px;
            display: block;
        }

        .controls-hint {
            margin-top: 15px;
            color: #a0aec0;
            font-size: 0.9rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
        }

        .btn-restart {
            margin-top: 15px;
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            display: none; /* Hidden until Game Over */
        }

        .btn-restart:hover {
            background: #ff5e7e;
        }
    </style>
</head>
<body>

    <header>
        <h1>RETRO ARCADE</h1>
        <p>Built with pure HTML, CSS, & JS</p>
    </header>

    <div class="game-container">
        <div class="scoreboard">
            <div id="score">Score: 0</div>
            <div id="high-score">High Score: 0</div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <button class="btn-restart" id="restartBtn" onclick="resetGame()">Play Again</button>

        <div class="controls-hint">
            <strong>Controls:</strong> Use the <strong>Arrow Keys</strong> or <strong>WASD</strong> on your keyboard to move the snake. Eat the red food to grow and score points!
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const restartBtn = document.getElementById("restartBtn");

        // Game Configuration
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let speed = 7; // Frames per second (higher = faster game)

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize; // Horizontal velocity
        let dy = 0;        // Vertical velocity
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameOver = false;
        let gameInterval;

        highScoreElement.innerText = `High Score: ${highScore}`;

        // Initialize and launch game loop
        resetGame();

        function gameLoop() {
            if (gameOver) return;

            clearCanvas();
            moveSnake();
            checkCollision();
            drawFood();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is cyan, body is slightly darker blue
                ctx.fillStyle = index === 0 ? "#00f2fe" : "#00b4d8";
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            // Create a new head based on current velocity directional steps
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check if snake ate the food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = `Score: ${score}`;
                generateFood();
            } else {
                // Remove tail block if food wasn't consumed
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Prevent food from spawning right on top of the snake's body
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e94560";
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
        }

        function checkCollision() {
            const head = snake[0];

            // Wall Collisions
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                endGame();
            }

            // Self Collisions
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                }
            }
        }

        function endGame() {
            gameOver = true;
            clearInterval(gameInterval);
            restartBtn.style.display = "block";

            // Update High Score tracking
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.innerText = `High Score: ${highScore}`;
            }

            // Draw Game Over Screen overlays
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#e94560";
            ctx.font = "30px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = "#fff";
            ctx.font = "16px sans-serif";
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
        }

        function resetGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            gameOver = false;
            scoreElement.innerText = "Score: 0";
            restartBtn.style.display = "none";
            
            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 1000 / speed);
        }

        // Capture user input keys
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const key = event.key.toLowerCase();
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            // Handle directional arrows or WASD mapping
            if ((key === "arrowleft" || key === "a") && !goingRight) {
                dx = -gridSize;
                dy = 0;
            }
            if ((key === "arrowup" || key === "w") && !goingDown) {
                dx = 0;
                dy = -gridSize;
            }
            if ((key === "arrowright" || key === "d") && !goingLeft) {
                dx = gridSize;
                dy = 0;
            }
            if ((key === "arrowdown" || key === "s") && !goingUp) {
                dx = 0;
                dy = gridSize;
            }
        }
    </script>
</body>
</html>
